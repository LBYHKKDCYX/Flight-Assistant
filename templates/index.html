<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>航空助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✈️ 航空助手</h1>
        <p>ICAO 机场查询 · METAR 气象报文翻译</p>
    </div>

    <div class="grid">
        <!-- ICAO 卡片 -->
        <div class="card">
            <div class="card-header">
                <h2><i>🛫</i> ICAO 代码查询</h2>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label>机场 ICAO 代码（4字母）</label>
                    <input type="text" id="icaoInput" placeholder="例如: ZBAA, KJFK, EGLL" maxlength="4" autocomplete="off">
                </div>
                <button class="btn" id="icaoBtn">🔍 查询机场信息</button>
                <div id="icaoResult" class="result-box">等待输入…</div>
                <!-- 历史记录区域 -->
                <div id="icaoHistory" style="margin-top: 15px;">
                    <span style="font-size: 0.8rem; color: #666;">最近查询：</span>
                    <div id="historyList" style="display: inline-flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
            </div>
        </div>

        <!-- METAR 卡片 -->
        <div class="card">
            <div class="card-header">
                <h2><i>🌦️</i> METAR 报文翻译</h2>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label>手动输入 METAR 报文（若使用获取实时报文，则此处是查询到的原始报文）</label>
                    <textarea id="metarInput" placeholder="示例: ZSSS 251200Z 12005KT 9999 FEW020 18/12 Q1018 NOSIG"></textarea>
                </div>
                <div class="input-group" style="margin-top: 10px;">
                    <label>或通过 ICAO 获取实时报文</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="fetchIcao" placeholder="ICAO 代码" style="flex: 1;">
                        <button id="fetchMetarBtn" class="btn">📡 获取实时报文</button>
                    </div>
                    <!-- 历史记录区域（METAR 专用） -->
                    <div id="metarHistory" style="margin-top: 8px;">
                        <span style="font-size: 0.8rem; color: #666;">最近查询：</span>
                        <div id="metarHistoryList" style="display: inline-flex; flex-wrap: wrap; gap: 8px;"></div>
                    </div>
                </div>  
                <button id="metarBtn" class="btn">📡 翻译报文</button>
                <div id="metarResult" class="result-box">等待输入…</div>
            </div>
        </div>
    </div>
    <div class="footer">
        ⚡ 数据基于 mwgg_airports 数据库 & IP2Location 国家代码数据库 | 时区自动转换
    </div>
</div>

<script>
    // DOM 元素
    const icaoInput = document.getElementById('icaoInput');
    const icaoBtn = document.getElementById('icaoBtn');
    const icaoResult = document.getElementById('icaoResult');
    const metarInput = document.getElementById('metarInput');
    const metarBtn = document.getElementById('metarBtn');
    const metarResult = document.getElementById('metarResult');
    const fetchIcao = document.getElementById('fetchIcao');
    const fetchMetarBtn = document.getElementById('fetchMetarBtn');

    // 通用请求函数
    async function fetchAPI(endpoint, data) {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText}`);
        }
        return await response.json();
    }

    // 设置加载状态
    function setLoading(element, isLoading, isError = false) {
        if (isLoading) {
            element.innerHTML = `<div class="spinner"></div> 加载中...`;
            element.classList.add('loading');
            element.classList.remove('error');
        } else {
            element.classList.remove('loading');
            if (isError) {
                element.classList.add('error');
            } else {
                element.classList.remove('error');
            }
        }
    }

    // ICAO 查询
    async function queryICAO() {
        const icao = icaoInput.value.trim().toUpperCase();
        if (!icao) {
            icaoResult.innerHTML = '⚠️ 请输入 ICAO 代码 (例如 ZBAA)';
            icaoResult.classList.add('error');
            return;
        }
        if (!/^[A-Z]{4}$/.test(icao)) {
            icaoResult.innerHTML = '❌ ICAO 代码应为 4 个大写字母 (A-Z)';
            icaoResult.classList.add('error');
            return;
        }

        setLoading(icaoResult, true);
        try {
            const data = await fetchAPI('/api/icao', { icao });
            if (data.error) {
                icaoResult.innerHTML = `❌ ${data.error}`;
                icaoResult.classList.add('error');
            } else {
                icaoResult.innerHTML = data.result.replace(/\n/g, '<br>');
                icaoResult.classList.remove('error');
                // 添加历史记录
                addToHistory(icao);
            }
        } catch (err) {
            icaoResult.innerHTML = `⚠️ 网络错误: ${err.message}<br>请确保后端服务已启动 (Flask)`;
            icaoResult.classList.add('error');
        } finally {
            setLoading(icaoResult, false);
        }
    }

    // METAR 翻译
    async function translateMETAR() {
        const metar = metarInput.value.trim();
        if (!metar) {
            metarResult.innerHTML = '⚠️ 请输入 METAR 报文内容';
            metarResult.classList.add('error');
            return;
        }

        setLoading(metarResult, true);
        try {
            const data = await fetchAPI('/api/metar', { metar });
            if (data.error) {
                metarResult.innerHTML = `❌ ${data.error}`;
                metarResult.classList.add('error');
            } else {
                metarResult.innerHTML = data.result.replace(/\n/g, '<br>');
                metarResult.classList.remove('error');
            }
        } catch (err) {
            metarResult.innerHTML = `⚠️ 网络错误: ${err.message}<br>请检查后端服务状态`;
            metarResult.classList.add('error');
        } finally {
            setLoading(metarResult, false);
        }
    }

    // 获取实时 METAR
    async function fetchRealTimeMetar() {
        const icao = fetchIcao.value.trim().toUpperCase();
        if (!icao) {
            alert('请输入 ICAO 代码');
            return;
        }
        if (!/^[A-Z]{4}$/.test(icao)) {
            alert('ICAO 代码应为 4 个大写字母');
            return;
        }

        metarResult.innerHTML = '<div class="spinner"></div> 获取中...';
        try {
            const response = await fetch('/api/fetch_metar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ icao })
            });
            const data = await response.json();
            if (data.error) {
                metarResult.innerHTML = `❌ ${data.error}`;
            } else {
                // 将获取到的 METAR 填充到文本框
                metarInput.value = data.metar;
                // 添加历史记录
                addToHistory(icao);
                // 自动触发翻译
                translateMETAR();
            }
        } catch (err) {
            metarResult.innerHTML = `⚠️ 请求失败: ${err.message}`;
        }
    }

    const HISTORY_KEY = 'icao_history';
    const MAX_HISTORY = 5;

    // 获取历史记录数组
    function getHistory() {
        const stored = localStorage.getItem(HISTORY_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    // 保存历史记录数组
    function saveHistory(history) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    // 添加新记录（去重，保持在前面，最多 MAX_HISTORY 条）
    function addToHistory(icao) {
        let history = getHistory();
        // 移除已存在的相同记录（如果有）
        history = history.filter(item => item !== icao);
        // 插入到最前面
        history.unshift(icao);
        // 限制数量
        if (history.length > MAX_HISTORY) history.pop();
        saveHistory(history);
        renderHistory();        // 刷新 ICAO 历史区域
        renderMetarHistory();   // 刷新 METAR 历史区域
    }

    // 渲染历史记录按钮
    function renderHistory() {
        const history = getHistory();
        const container = document.getElementById('historyList');
        if (!container) return;
        if (history.length === 0) {
            container.innerHTML = '<span style="color: #999;">无</span>';
            return;
        }
        container.innerHTML = history.map(icao => 
            `<button class="history-btn" data-icao="${icao}" style="background: #e9ecef; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;">${icao}</button>`
        ).join('');
    
        // 绑定点击事件
        document.querySelectorAll('.history-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const icao = btn.getAttribute('data-icao');
                document.getElementById('icaoInput').value = icao;
                queryICAO();  // 直接调用查询函数
            });
        });
    }

    // 渲染 METAR 历史记录（用于实时获取报文）
    function renderMetarHistory() {
        const history = getHistory();
        const container = document.getElementById('metarHistoryList');
        if (!container) return;
        if (history.length === 0) {
            container.innerHTML = '<span style="color: #999;">无</span>';
            return;
        }
        container.innerHTML = history.map(icao => 
            `<button class="history-btn" data-icao="${icao}" style="background: #e9ecef; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;">${icao}</button>`
        ).join('');
    
        // 绑定点击事件
        document.querySelectorAll('#metarHistoryList .history-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const icao = btn.getAttribute('data-icao');
                document.getElementById('fetchIcao').value = icao;
                fetchRealTimeMetar();  // 调用已有的获取实时报文函数
            });
        });
    }


    // 页面加载时渲染历史记录
    renderHistory();
    renderMetarHistory();

    // 绑定事件
    icaoBtn.addEventListener('click', queryICAO);
    metarBtn.addEventListener('click', translateMETAR);
    fetchMetarBtn.addEventListener('click', fetchRealTimeMetar);

    // ICAO 输入框回车查询（阻止默认行为，防止表单提交）
    icaoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            queryICAO();
        }
    });

    // 获取实时报文的 ICAO 输入框回车查询
    fetchIcao.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            fetchRealTimeMetar();
        }
    });

    // 支持 Ctrl+Enter 翻译 METAR（可选）
    metarInput.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            translateMETAR();
        }
    });
</script>
</body>
</html>
